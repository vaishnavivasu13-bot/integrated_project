<!DOCTYPE html>
<html>
<head>
    <title>Products - GlamCart</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="overlay"></div>
    <div class="content">
        <h2>✨ Our Products</h2>
        <div class="products">
            {% for product in products %}
            <div class="product-card">
                <img src="/static/images/{{ product[3] }}" onerror="this.src='https://via.placeholder.com/150'">
                <h3>{{ product[1] }}</h3>
                <p>₹{{ product[2] }}</p>
                <button class="add-btn" data-id="{{ product[0] }}">Add to Cart 🛒</button>
            </div>
            {% endfor %}
        </div>
        <a href="/cart" class="cart-link">🛒 View Cart</a>
        <a href="/" class="home-link">🏠 Home</a>
    </div>
    <script src="/static/script.js"></script>
</body>
</html>
