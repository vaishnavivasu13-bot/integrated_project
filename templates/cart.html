<!DOCTYPE html>
<html>
<head>
    <title>Cart - GlamCart</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="overlay"></div>
    <div class="content">
        <h2>🛒 Your Cart</h2>
        {% if items %}
            {% for item in items %}
            <div class="cart-item">
                <span>{{ item.name }}</span>
                <span>Qty: {{ item.qty }}</span>
                <span>₹{{ item.subtotal }}</span>
            </div>
            {% endfor %}
            <h3>Total: ₹{{ total }}</h3>
            <a href="/checkout" class="btn">Checkout ✅</a>
        {% else %}
            <p>Cart is empty 🛍️</p>
        {% endif %}
        <a href="/products">Continue Shopping</a>
    </div>
</body>
</html>
